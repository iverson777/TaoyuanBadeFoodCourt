    var cuisineLabelsMap = {
      taiwanese: '台式', japanese: '日式', korean: '韓式', chinese: '中式',

    function initMap() {
      var restaurants = JSON.parse(document.getElementById('map-data').textContent);
      var center = { lat: 24.9510, lng: 121.2850 };

      var map = new google.maps.Map(document.getElementById('map'), {
        zoom: 15,
        center: center,
        disableDefaultUI: true,
        zoomControl: true,
        gestureHandling: 'greedy',
      });

      var infoWindow = new google.maps.InfoWindow();

      var cuisineColors = {
        taiwanese: '#e8803a',
        japanese: '#e63946',
        korean: '#9b59b6',
        chinese: '#d4a017',
        western: '#2a9d8f',
        southeast_asian: '#27ae60',
        hotpot: '#c0392b',
        beverage: '#3498db',
        other: '#95a5a6',
      };

      restaurants.forEach(function(r) {
        if (!r.lat || !r.lng) return;

        var marker = new google.maps.Marker({
          position: { lat: r.lat, lng: r.lng },
          map: map,
          title: r.name,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            fillColor: cuisineColors[r.cuisine] || '#e8803a',
            fillOpacity: 0.9,
            strokeColor: '#fff',
            strokeWeight: 2,
            scale: 10,
          },
        });

        var price = '$'.repeat(r.priceRange);
        var cLabel = cuisineLabelsMap[r.cuisine] || r.cuisine;
        var dishesText = r.dishes && r.dishes.length > 0 ? r.dishes.join(' / ') : '';

        marker.addListener('click', function() {
          infoWindow.setContent(
            '<div style="font-family:-apple-system,sans-serif;max-width:220px;line-height:1.4;">' +
              '<div style="font-weight:700;font-size:14px;margin-bottom:4px;">' + r.name + '</div>' +
              '<div style="font-size:12px;color:#666;margin-bottom:4px;">' +
                '⭐ ' + r.rating + ' (' + r.reviewCount + ') | ' + price + ' | ' + cLabel +
              '</div>' +
              (dishesText ? '<div style="font-size:11px;color:#e8803a;margin-bottom:4px;">招牌：' + dishesText + '</div>' : '') +
              '<div style="font-size:11px;color:#888;">' + r.address + '</div>' +
              '<div style="font-size:11px;color:#888;margin-bottom:6px;">' + r.hours + '</div>' +
              '<a href="' + r.googleMapsUrl + '" target="_blank" rel="noopener"' +
                ' style="display:inline-block;background:#e8803a;color:#fff;padding:4px 12px;border-radius:6px;font-size:12px;text-decoration:none;">' +
                '導航' +
              '</a>' +
            '</div>'
          );
          infoWindow.open(map, marker);
        });
      });
    }

    // === Favorites & Personal Data Helpers (Global) ===
    window.BadeFood = {
      FAVORITES_KEY: 'bade-food-favorites',
      PERSONAL_KEY: 'bade-food-personal',

      getFavorites() {
        try { return JSON.parse(localStorage.getItem(this.FAVORITES_KEY)) || []; }
        catch { return []; }
      },

      isFavorite(id) {
        return this.getFavorites().includes(id);
      },

      toggleFavorite(id) {
        const favs = this.getFavorites();
        const idx = favs.indexOf(id);
        if (idx >= 0) favs.splice(idx, 1);
        else favs.push(id);
        localStorage.setItem(this.FAVORITES_KEY, JSON.stringify(favs));
        return idx < 0; // returns true if added
      },

      getPersonalData() {
        try { return JSON.parse(localStorage.getItem(this.PERSONAL_KEY)) || {}; }
        catch { return {}; }
      },

      getPersonal(id) {
        const data = this.getPersonalData();
        return data[id] || { visitCount: 0, myRating: 0, note: '', blacklisted: false };
      },

      setPersonal(id, fields) {
        const data = this.getPersonalData();
        data[id] = { ...this.getPersonal(id), ...fields };
        localStorage.setItem(this.PERSONAL_KEY, JSON.stringify(data));
        return data[id];
      },

      incrementVisit(id) {
        const p = this.getPersonal(id);
        return this.setPersonal(id, { visitCount: p.visitCount + 1 });
      },

      isBlacklisted(id) {
        return this.getPersonal(id).blacklisted;
      }
    };
  </script> </body> </html>
