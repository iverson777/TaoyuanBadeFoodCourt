"southeast_asian":"東南亞","hotpot":"火鍋","beverage":"飲料","other":"其他"};
const categoryLabels = {"breakfast":"早餐","lunch":"午餐","dinner":"晚餐","snacks":"小吃"};
const cuisineEmojis = {"taiwanese":"🍚","japanese":"🍣","korean":"🥘","chinese":"🥟","western":"🍔","southeast_asian":"🍜","hotpot":"🫕","beverage":"🧋","other":"🍽️"};

  (function() {
    const allData = JSON.parse(document.getElementById('all-restaurant-data').textContent);
    const grid = document.getElementById('fav-grid');
    const emptyEl = document.getElementById('fav-empty');
    const countEl = document.getElementById('fav-count');
    const sortSelect = document.getElementById('fav-sort');

    function renderFavorites() {
      const favIds = window.BadeFood.getFavorites();
      const favRestaurants = favIds
        .map(id => allData.find(r => r.id === id))
        .filter(Boolean);

      countEl.textContent = favRestaurants.length + ' 間收藏';
      emptyEl.classList.toggle('hidden', favRestaurants.length > 0);
      grid.classList.toggle('hidden', favRestaurants.length === 0);

      grid.innerHTML = favRestaurants.map(r => {
        const priceLabel = '$'.repeat(r.priceRange);
        const cLabel = cuisineLabels[r.cuisine] || r.cuisine;
        const catLabels = r.category.map(c => categoryLabels[c] || c);
        const personal = window.BadeFood.getPersonal(r.id);

        const emoji = cuisineEmojis[r.cuisine] || '🍽️';
        const imageHtml = r.image
          ? `<div class="card-image"><img src="${r.image}" alt="${r.name}" loading="lazy" /></div>`
          : `<div class="card-image"><div class="card-image-placeholder"><span class="card-image-emoji">${emoji}</span></div></div>`;
        const dishesHtml = r.dishes && r.dishes.length > 0
          ? `<div class="card-dishes"><span class="card-dishes-label">招牌：</span>${r.dishes.join(' / ')}</div>`
          : '';

        return `
          <div class="card" data-id="${r.id}" data-rating="${r.rating}" data-review-count="${r.reviewCount}">
            ${imageHtml}
            <div class="card-header">
              <div>
                <div class="card-name">${r.name}</div>
                <div class="card-meta">
                  <span class="card-rating">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    ${r.rating}
                  </span>
                  <span>(${r.reviewCount})</span>
                  <span class="card-price">${priceLabel}</span>
                  <span class="card-walking">🚶 ${r.walkingMinutes}分</span>
                </div>
              </div>
              <button class="card-fav-btn is-fav" data-unfav-id="${r.id}" title="移除收藏">&#9829;</button>
            </div>
            <div class="card-tags">
              <span class="card-cuisine-tag">${cLabel}</span>
              ${catLabels.map(c => `<span class="card-tag">${c}</span>`).join('')}
            </div>
            ${dishesHtml}
            <div class="card-address">${r.address}</div>
            <div class="card-hours">${r.hours}</div>
            ${personal.visitCount > 0 ? `<div style="font-size:0.8rem;color:var(--color-text-light);margin-top:6px;">已造訪 ${personal.visitCount} 次${personal.myRating ? ' | 私心 ' + '★'.repeat(personal.myRating) : ''}</div>` : ''}
            ${personal.note ? `<div style="font-size:0.8rem;color:var(--color-text-light);margin-top:4px;">📝 ${personal.note}</div>` : ''}
            <div class="card-actions">
              <a class="card-action-btn primary" href="${r.googleMapsUrl}" target="_blank" rel="noopener">Google Maps</a>
            </div>
          </div>
        `;
      }).join('');
    }

    // Remove from favorites
    grid.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-unfav-id]');
      if (btn) {
        const id = btn.dataset.unfavId;
        window.BadeFood.toggleFavorite(id);
        renderFavorites();
      }
    });

    // Sort
    sortSelect.addEventListener('change', () => {
      renderFavorites();
      const cards = Array.from(grid.querySelectorAll('.card'));
      const sortBy = sortSelect.value;
      const sorted = cards.sort((a, b) => {
        switch (sortBy) {
          case 'rating':
            return parseFloat(b.dataset.rating) - parseFloat(a.dataset.rating);
          case 'my-rating': {
            const ar = window.BadeFood.getPersonal(a.dataset.id).myRating || 0;
            const br = window.BadeFood.getPersonal(b.dataset.id).myRating || 0;
            return br - ar;
          }
          case 'visits': {
            const av = window.BadeFood.getPersonal(a.dataset.id).visitCount || 0;
            const bv = window.BadeFood.getPersonal(b.dataset.id).visitCount || 0;
            return bv - av;
          }
          default: return 0;
        }
      });
      sorted.forEach(c => grid.appendChild(c));
    });

    renderFavorites();
  })();
  })();</script>  <nav class="bottom-nav" aria-label="主選單"> <a href="/TaoyuanBadeFoodCourt/"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg> <span>探索</span> </a> <a href="/TaoyuanBadeFoodCourt/map/"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg> <span>地圖</span> </a> <a href="/TaoyuanBadeFoodCourt/random/"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"></rect><circle cx="8" cy="8" r="1.5" fill="currentColor"></circle><circle cx="16" cy="8" r="1.5" fill="currentColor"></circle><circle cx="8" cy="16" r="1.5" fill="currentColor"></circle><circle cx="16" cy="16" r="1.5" fill="currentColor"></circle><circle cx="12" cy="12" r="1.5" fill="currentColor"></circle></svg> <span>隨機</span> </a> <a href="/TaoyuanBadeFoodCourt/favorites/" class="active"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg> <span>收藏</span> </a> </nav> <script>
    // === Favorites & Personal Data Helpers (Global) ===
    window.BadeFood = {
      FAVORITES_KEY: 'bade-food-favorites',
      PERSONAL_KEY: 'bade-food-personal',

      getFavorites() {
        try { return JSON.parse(localStorage.getItem(this.FAVORITES_KEY)) || []; }
        catch { return []; }
      },

      isFavorite(id) {
        return this.getFavorites().includes(id);
      },

      toggleFavorite(id) {
        const favs = this.getFavorites();
        const idx = favs.indexOf(id);
        if (idx >= 0) favs.splice(idx, 1);
        else favs.push(id);
        localStorage.setItem(this.FAVORITES_KEY, JSON.stringify(favs));
        return idx < 0; // returns true if added
      },

      getPersonalData() {
        try { return JSON.parse(localStorage.getItem(this.PERSONAL_KEY)) || {}; }
        catch { return {}; }
      },

      getPersonal(id) {
        const data = this.getPersonalData();
        return data[id] || { visitCount: 0, myRating: 0, note: '', blacklisted: false };
      },

      setPersonal(id, fields) {
        const data = this.getPersonalData();
        data[id] = { ...this.getPersonal(id), ...fields };
        localStorage.setItem(this.PERSONAL_KEY, JSON.stringify(data));
        return data[id];
      },

      incrementVisit(id) {
        const p = this.getPersonal(id);
        return this.setPersonal(id, { visitCount: p.visitCount + 1 });
      },

      isBlacklisted(id) {
        return this.getPersonal(id).blacklisted;
      }
    };
  </script> </body> </html>
